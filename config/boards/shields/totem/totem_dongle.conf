CONFIG_ZMK_SPLIT_BLE_CENTRAL_PERIPHERALS=2

CONFIG_ZMK_SLEEP=n

# =========================================================
# Display Configuration
# =========================================================
CONFIG_ZMK_DISPLAY=y

# =========================================================
# APDS9960 Ambient Light Sensor Configuration
# =========================================================
# Currently building WITHOUT the APDS9960 sensor.
# Setting this to 'n' forces the backlight to turn on normally
# without waiting for data from the i2c sensor.
CONFIG_PROSPECTOR_USE_AMBIENT_LIGHT_SENSOR=n

# ---------------------------------------------------------
# FUTURE USE: When you add the APDS9960 sensor later,
# change the above line to 'CONFIG_PROSPECTOR_USE_AMBIENT_LIGHT_SENSOR=y'
# and uncomment the following lines to enable I2C and the sensor:
# ---------------------------------------------------------
# CONFIG_I2C=y
# CONFIG_APDS9960=y


